// ============================================================
// Learning Panel (🎓 Learning Notes)
// ============================================================
// Optional: only wired up when the source doc had a `## Learning Notes` section and the
// panel markup was emitted. Fully feature-detected — when the markup is absent (still an
// HTML comment) getElementById returns null and this block no-ops, so docs without
// Learning Notes render and behave exactly as before. Runs top-level (outside init) so it
// works in annotations-off mode too. Mutually exclusive with the TOC sidebar (both live on
// the left edge) so the two panels can never overlap.
(function () {
  const learnToggle = document.getElementById('learning-toggle');
  const learnEl = document.getElementById('learning-panel');
  if (!learnToggle || !learnEl) return;

  const learnClose = document.getElementById('learning-close');
  const LEARN_OPEN_KEY = STORAGE_KEY + '-learn-open';

  function safeGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function safeSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function isLearningOpen() { return document.body.classList.contains('learning-open'); }

  function setLearningOpen(open) {
    document.body.classList.toggle('learning-open', open);
    learnToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    safeSet(LEARN_OPEN_KEY, open ? '1' : '0');
    if (open) {
      // Close the TOC so the two left-edge panels never overlap.
      try { setSidebarPinned(false); } catch (e) {}
      try { sidebarEl.classList.remove('show', 'hover-mode', 'pinned-mode'); } catch (e) {}
    }
  }

  learnToggle.addEventListener('click', () => setLearningOpen(!isLearningOpen()));
  if (learnClose) learnClose.addEventListener('click', () => setLearningOpen(false));

  // If the TOC is invoked (hover or click), yield to it.
  try {
    sidebarToggle.addEventListener('mouseenter', () => { if (isLearningOpen()) setLearningOpen(false); });
    sidebarToggle.addEventListener('click', () => { if (isLearningOpen()) setLearningOpen(false); });
    sidebarEl.addEventListener('mouseenter', () => { if (isLearningOpen()) setLearningOpen(false); });
  } catch (e) {}

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isLearningOpen()) setLearningOpen(false);
  });

  // Restore last state (default closed).
  if (safeGet(LEARN_OPEN_KEY) === '1') setLearningOpen(true);
})();

// ============================================================
// File Sync (File System Access API + Import JSON)
// ============================================================
// Persistence options, in order of preference when available:
//   1. File System Access API — auto-sync to <doc>.comments.json (Chrome/Edge via localhost)
//   2. Import JSON — manual file picker (all browsers, cross-browser migration)
//   3. localStorage — always on as cache (existing behavior)

const FILE_SYNC_DB = 'htmlify-file-sync-v1';
const FILE_SYNC_STORE = 'handles';
const FILE_SYNC_KEY = STORAGE_KEY;  // per-doc handle key (one shared DB, isolated per document)

function openSyncDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(FILE_SYNC_DB, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(FILE_SYNC_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function storeFileHandle(handle) {
  const db = await openSyncDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(FILE_SYNC_STORE, 'readwrite');
    tx.objectStore(FILE_SYNC_STORE).put(handle, FILE_SYNC_KEY);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
async function retrieveFileHandle() {
  const db = await openSyncDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(FILE_SYNC_STORE, 'readonly');
    const req = tx.objectStore(FILE_SYNC_STORE).get(FILE_SYNC_KEY);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => rej(req.error);
  });
}
async function clearFileHandle() {
  const db = await openSyncDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(FILE_SYNC_STORE, 'readwrite');
    tx.objectStore(FILE_SYNC_STORE).delete(FILE_SYNC_KEY);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

const fileSync = {
  handle: null,
  enabled: false,
  filename: null,
  saveTimer: null,

  isAvailable() { return typeof window.showSaveFilePicker === 'function'; },

  async restore() {
    if (!this.isAvailable()) return false;
    try {
      const h = await retrieveFileHandle();
      if (!h) return false;
      this.handle = h;
      this.filename = h.name;
      const perm = await h.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') { this.enabled = true; return true; }
      this.enabled = false;
      return false;
    } catch (e) { console.warn('[file-sync] restore', e); return false; }
  },

  async ensurePermission() {
    if (!this.handle) return false;
    let p = await this.handle.queryPermission({ mode: 'readwrite' });
    if (p !== 'granted') p = await this.handle.requestPermission({ mode: 'readwrite' });
    this.enabled = (p === 'granted');
    return this.enabled;
  },

  async link() {
    if (!this.isAvailable()) {
      showToast('此 browser 不支援 File System Access API（Chrome / Edge only）— 改用 Import JSON');
      return false;
    }
    try {
      const h = await window.showSaveFilePicker({
        suggestedName: sidecarName(),
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
      this.handle = h;
      this.filename = h.name;
      this.enabled = true;
      await storeFileHandle(h);

      // If the file already had content AND we have diverging unsaved local edits, ask which wins.
      // When not dirty, in-memory already matches the file (we fetched it) — just save, no prompt.
      try {
        const file = await h.getFile();
        const text = await file.text();
        if (text.trim() && isDirty()) {
          const parsed = JSON.parse(text);
          if (Array.isArray(parsed.comments) && parsed.comments.length > 0) {
            const useFile = confirm(
              `檔案內已有 ${parsed.comments.length} 個 comment。\n\n` +
              `[OK] 用檔案內容覆蓋目前 ${comments.length} 個\n` +
              `[Cancel] 用目前 ${comments.length} 個覆蓋檔案`
            );
            if (useFile) {
              comments = parsed.comments;
              saveCommentsLocal();
              document.querySelectorAll('mark.annot').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
              comments.forEach(c => {
                const ok = restoreComment(c);
                c.outdated = !ok && !c.resolved;
                if (ok && c.resolved) updateMarkResolvedState(c.id, true);
              });
              renderCommentList();
            }
          }
        }
      } catch (e) { /* new empty file, OK */ }

      await this.save();
      updateSyncStatus();
      showToast(`📁 已連結到 ${this.filename}，後續自動同步`);
      return true;
    } catch (e) {
      if (e.name !== 'AbortError') { console.warn('[file-sync] link', e); showToast('連結檔案失敗'); }
      return false;
    }
  },

  async unlink() {
    this.handle = null;
    this.filename = null;
    this.enabled = false;
    await clearFileHandle();
    updateSyncStatus();
    showToast('已解除檔案連結（改回 localStorage only）');
  },

  async save() {
    if (!this.handle || !this.enabled) return false;
    try {
      const data = {
        version: 1,
        doc: DOC_NAME,
        saved_at: new Date().toISOString(),
        comment_count: comments.length,
        comments
      };
      const writable = await this.handle.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
      clearDirty();
      return true;
    } catch (e) { console.warn('[file-sync] save', e); return false; }
  },

  scheduleSave() {
    if (!this.enabled) return;
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(() => this.save(), 250);
  },

  async loadIfLinked() {
    if (!this.handle || !this.enabled) return null;
    try {
      const file = await this.handle.getFile();
      const text = await file.text();
      if (!text.trim()) return { comments: [] };
      return JSON.parse(text);
    } catch (e) { console.warn('[file-sync] load', e); return null; }
  }
};

function updateSyncStatus() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const file = sidecarName();
  const src = loadComments._source;
  const dirty = isDirty();

  if (fileSync.enabled) {
    el.className = 'sync-status synced';
    el.innerHTML = `<span>📁</span> Synced · <code>${escapeHtml(fileSync.filename)}</code> · 編輯自動寫入 · <button class="btn-link" data-action="unlink">unlink</button>`;
  } else if (fileSync.handle && !fileSync.enabled) {
    el.className = 'sync-status pending';
    el.innerHTML = `<span>⚠</span> 已記得檔案 (<code>${escapeHtml(fileSync.filename)}</code>) · <button class="btn-link" data-action="resume">grant permission</button> · <button class="btn-link" data-action="unlink">unlink</button>`;
  } else if (dirty) {
    el.className = 'sync-status pending';
    const writeBtn = fileSync.isAvailable()
      ? `<button class="btn-link" data-action="link">save to ${escapeHtml(file)}…</button>`
      : `<button class="btn-link" data-action="export">download ${escapeHtml(file)}…</button>`;
    el.innerHTML = `<span>💾</span> 有未存入 <code>${escapeHtml(file)}</code> 的本機編輯 · ${writeBtn} · <button class="btn-link" data-action="import">import…</button>`;
  } else if (src === 'fetch') {
    el.className = 'sync-status readonly';
    const editBtn = fileSync.isAvailable()
      ? ` · <button class="btn-link" data-action="link">enable editing…</button>`
      : '';
    el.innerHTML = `<span>📄</span> 自動載入自 <code>${escapeHtml(file)}</code>（read-only）${editBtn} · <button class="btn-link" data-action="import">import…</button>`;
  } else if (fileSync.isAvailable()) {
    el.className = 'sync-status local';
    el.innerHTML = `<span>💾</span> Local only · <button class="btn-link" data-action="link">link to ${escapeHtml(file)}…</button> · <button class="btn-link" data-action="import">import…</button>`;
  } else {
    el.className = 'sync-status local';
    el.innerHTML = `<span>💾</span> Local only · 此 browser 不支援 File API · <button class="btn-link" data-action="import">import JSON…</button>`;
  }
  // Wire dynamic buttons
  el.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const a = btn.dataset.action;
      if (a === 'link') await fileSync.link();
      else if (a === 'unlink') await fileSync.unlink();
      else if (a === 'export') {
        const data = { version: 1, doc: DOC_NAME, saved_at: new Date().toISOString(), comment_count: comments.length, comments };
        downloadBlob(JSON.stringify(data, null, 2), 'application/json', file);
        showToast(`↓ 已下載 ${file} — 放到 HTML 同層再 commit`);
      }
      else if (a === 'resume') {
        const ok = await fileSync.ensurePermission();
        if (ok) {
          const remote = await fileSync.loadIfLinked();
          if (remote && Array.isArray(remote.comments)) {
            comments = remote.comments;
            clearDirty();
            saveCommentsLocal();
            document.querySelectorAll('mark.annot').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
            comments.forEach(c => {
              const ok2 = restoreComment(c);
              c.outdated = !ok2 && !c.resolved;
              if (ok2 && c.resolved) updateMarkResolvedState(c.id, true);
            });
            renderCommentList();
          }
          updateSyncStatus();
          showToast('✓ 檔案同步已重新啟用');
        }
      }
      else if (a === 'import') importJsonFromFile();
    });
  });
}

function importJsonFromFile() {
  return new Promise((resolve) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) { resolve(null); return; }
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!Array.isArray(data.comments)) { showToast('JSON 格式不對（缺少 comments array）'); resolve(null); return; }
        let take;
        if (comments.length === 0) {
          take = 'replace';
        } else {
          const ans = confirm(
            `目前已有 ${comments.length} 個 comment，檔案內有 ${data.comments.length} 個。\n\n` +
            `[OK] 取代（用檔案覆蓋目前）\n` +
            `[Cancel] 合併（依 id 去重，重複的保留現有）`
          );
          take = ans ? 'replace' : 'merge';
        }
        if (take === 'replace') {
          comments = data.comments;
        } else {
          const existing = new Set(comments.map(c => c.id));
          data.comments.forEach(c => { if (!existing.has(c.id)) comments.push(c); });
        }
        saveComments();
        document.querySelectorAll('mark.annot').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
        comments.forEach(c => {
          const ok = restoreComment(c);
          c.outdated = !ok && !c.resolved;
          if (ok && c.resolved) updateMarkResolvedState(c.id, true);
        });
        renderCommentList();
        showToast(`✓ ${take === 'replace' ? '已取代' : '已合併'}：現在 ${comments.length} 個 comment`);
        resolve(data);
      } catch (err) { console.warn('import failed', err); showToast('JSON 解析失敗'); resolve(null); }
    };
    input.click();
  });
}

// ============================================================
// Comment panel resize (drag the left edge; width persists)
// ============================================================
const COMMENT_WIDTH_KEY = STORAGE_KEY + '-width';
const COMMENT_W_MIN = 240;
const COMMENT_W_MAX = 760;

// Keep the fixed handle aligned with the panel's actual left edge (the layout is
// centered with a max-width, so the edge isn't simply viewport-width − panel-width).
function positionResizeHandle() {
  const handle = document.getElementById('comment-resize-handle');
  const panel = document.getElementById('comment-panel');
  if (!handle || !panel) return;
  if (getComputedStyle(handle).display === 'none') return;  // mobile
  const r = panel.getBoundingClientRect();
  if (r.width === 0) return;  // panel hidden (annotations-off)
  handle.style.left = (r.left - 4) + 'px';
}

function applyCommentWidth(px) {
  const w = Math.round(Math.min(COMMENT_W_MAX, Math.max(COMMENT_W_MIN, px)));
  document.documentElement.style.setProperty('--comment-w', w + 'px');
  positionResizeHandle();
  return w;
}

function applyStoredCommentWidth() {
  const raw = localStorage.getItem(COMMENT_WIDTH_KEY);
  if (raw) {
    const n = parseInt(raw, 10);
    if (!isNaN(n)) applyCommentWidth(n);
  }
}

function bindCommentResize() {
  const handle = document.getElementById('comment-resize-handle');
  if (!handle || handle.dataset.bound) return;
  handle.dataset.bound = '1';

  let startX = 0, startW = 0, dragging = false;

  function currentWidth() {
    const v = getComputedStyle(document.documentElement).getPropertyValue('--comment-w');
    const n = parseInt(v, 10);
    return isNaN(n) ? 320 : n;
  }
  function onMove(e) {
    if (!dragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    applyCommentWidth(startW + (startX - x));  // drag left → panel grows (right-anchored)
    e.preventDefault();
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    document.body.classList.remove('comment-resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    localStorage.setItem(COMMENT_WIDTH_KEY, String(currentWidth()));
  }
  function onDown(e) {
    dragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    startW = currentWidth();
    document.body.classList.add('comment-resizing');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    e.preventDefault();
  }
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  handle.addEventListener('dblclick', () => {  // double-click resets to default
    applyCommentWidth(320);
    localStorage.setItem(COMMENT_WIDTH_KEY, '320');
  });
  window.addEventListener('resize', positionResizeHandle);
  positionResizeHandle();
}

// Apply persisted width + bind drag immediately (independent of comment loading)
applyStoredCommentWidth();
bindCommentResize();

// ============================================================
// Init (wait for mermaid + hljs to finish rendering)
// ============================================================

async function init() {
  bindMermaidLightbox();
  // Annotation system is opt-out: skip wiring it up when body.annotations-off is set.
  if (!document.body.classList.contains('annotations-off')) {
    await loadComments();
    updateSyncStatus();
  }
  positionResizeHandle();
}
// Wait a bit for mermaid SVG rendering to settle
setTimeout(init, 1800);
</script>

<script>
// Collapsible comment panel — state persists per doc (STORAGE_KEY)
(function(){
  if (document.body.classList.contains('annotations-off')) return;
  const KEY = STORAGE_KEY + '-panel-collapsed';
  function setCollapsed(v){
    document.body.classList.toggle('comment-collapsed', v);
    try { localStorage.setItem(KEY, v ? '1' : '0'); } catch(e){}
  }
  window.expandCommentPanel = () => setCollapsed(false);
  document.getElementById('comment-collapse').addEventListener('click', () => setCollapsed(true));
  document.getElementById('comment-expand-tab').addEventListener('click', () => setCollapsed(false));
  try { if (localStorage.getItem(KEY) === '1') setCollapsed(true); } catch(e){}
})();
</script>
